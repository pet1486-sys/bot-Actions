name: Run Data Bot

# ตั้งค่าเหตุการณ์ในการสั่งให้บอททำงาน
on:
  schedule:
    - cron: '0 0 * * *' # 🕒 ตั้งเวลาให้บอทรันอัตโนมัติทุกวันตอนเที่ยงคืน (ตามเวลา UTC)
  workflow_dispatch:     # 🔘 เพิ่มปุ่มกดให้คุณสามารถสั่งกดรันด้วยตัวเองแมนนวลได้จากหน้าเว็บ GitHub

jobs:
  build:
    runs-on: ubuntu-latest # ใช้ระบบปฏิบัติการ Linux ในการรันบอทชั่วคราว
    
    steps:
      # 1. ดึงโค้ดทั้งหมดจาก Repository มาเตรียมไว้บนบอท
      - name: Checkout repository code
        uses: actions/checkout@v3

      # 2. ติดตั้งระบบ Python รุ่น 3.9 บนบอท
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. ติดตั้ง Chrome Browser และ Library พร้อมอัปเดตเวอร์ชันล่าสุด (จุดแก้ไขป้องกันบั๊กคลาสเก่า)
      - name: Install Chrome and dependencies
        run: |
          # 🌐 ติดตั้ง Chrome Browser สำหรับ Selenium
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # 🐍 อัปเดตเครื่องมือติดตั้งและสั่งอัปเกรด google-cloud-bigquery ให้เป็นตัวใหม่ล่าสุด
          python -m pip install --upgrade pip
          python -m pip install --upgrade google-cloud-bigquery
          
          # ติดตั้ง library อื่นๆ ที่มีในไฟล์ของคุณเพิ่มเติม
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. ดึง JSON Key จาก GitHub Secrets มายืนยันตัวตนกับ Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 5. สั่งรันสคริปต์ Python เพื่อดาวน์โหลดไฟล์และส่งเข้า BigQuery ทันที
      - name: Run Python Script
        run: python silom_sku.py